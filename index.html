<!doctype html>
<html lang="cs"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>A24 OSVČ Radar</title>
<style>
:root{--bg:#030712;--panel:#080b16;--accent:#ec0044;--text:#fff;--muted:#9ca3af;--line:#20283a;--done:#22c55e;--done-bg:#071b10;--rejected:#ef4444;--rejected-bg:#210a0a}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:15px/1.5 Arial,sans-serif}
header{padding:28px clamp(18px,4vw,54px);border-bottom:1px solid var(--line);background:linear-gradient(135deg,#080b16,#130813)}
h1{margin:0 0 6px;font-size:clamp(28px,4vw,48px)}h1 span{color:var(--accent)}.sub{color:var(--muted)}
main{padding:24px clamp(18px,4vw,54px)}.stats,.filters{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.stat,.filters select,.filters input{background:var(--panel);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:12px}
.stat strong{color:var(--accent);font-size:22px}.stat.done-stat strong{color:var(--done)}.stat.rejected-stat strong{color:var(--rejected)}.filters input{min-width:260px;flex:1}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px}.card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;transition:.2s ease}
.card.new{border-color:var(--accent)}.card.done{border:2px solid var(--done);background:linear-gradient(145deg,var(--done-bg),var(--panel))}.card.rejected{border:2px solid var(--rejected);background:linear-gradient(145deg,var(--rejected-bg),var(--panel))}.card.done h2,.card.done .meta,.card.done>p,.card.rejected h2,.card.rejected .meta,.card.rejected>p{opacity:.62}
.meta,.proof{color:var(--muted);font-size:13px}.badge{display:inline-block;padding:4px 8px;border-radius:99px;background:#24101a;color:#ff7ba1;margin:0 6px 8px 0}.done-badge{background:var(--done);color:#041208;font-weight:700}.rejected-badge{background:var(--rejected);color:#fff;font-weight:700}
a{color:#ff5b8a}.actions{display:flex;align-items:center;gap:9px;margin-top:16px;flex-wrap:wrap}.actions a{margin-right:auto}.state-btn,.note-btn,.copy-btn,.delete-note{border-radius:9px;padding:9px 13px;font-weight:700;cursor:pointer}.done-btn{border:1px solid var(--done);background:transparent;color:#86efac}.done-btn:hover,.done-btn:focus{background:#123c21}.card.done .done-btn{background:var(--done);color:#041208}.reject-btn{border:1px solid var(--rejected);background:transparent;color:#fca5a5}.reject-btn:hover,.reject-btn:focus{background:#481515}.card.rejected .reject-btn{background:var(--rejected);color:#fff}.note-box,.reply-box{margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}.note-box label,.reply-box label{display:block;font-weight:700;margin-bottom:7px}.note-box textarea,.reply-box textarea{width:100%;resize:vertical;background:#050914;border:1px solid #35405a;border-radius:9px;color:#fff;padding:10px;font:inherit}.note-box textarea{min-height:82px}.reply-box textarea{min-height:220px}.date-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;flex-wrap:wrap}.date-row label{margin:0}.note-date{background:#050914;border:1px solid #35405a;border-radius:8px;color:#fff;padding:8px;color-scheme:dark}.note-row{display:flex;align-items:center;gap:10px;margin-top:8px}.note-btn{border:0;background:#374151;color:#fff}.copy-btn{border:1px solid #ff5b8a;background:#24101a;color:#ffb1c8}.note-saved,.copy-saved{color:#86efac;font-size:13px}.notes-history{display:grid;gap:9px;margin-bottom:14px}.saved-note{background:#0d1423;border-left:4px solid #60a5fa;border-radius:8px;padding:10px 11px}.saved-note-date{display:flex;align-items:center;justify-content:space-between;gap:8px;color:#93c5fd;font-weight:700;font-size:13px;margin-bottom:5px}.saved-note-text{white-space:pre-wrap}.delete-note{padding:3px 7px;border:0;background:transparent;color:#fca5a5;font-size:12px}.no-notes{color:var(--muted);font-size:13px;margin-bottom:12px}.empty{padding:42px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:14px}
</style></head><body>
<header><h1>A24 <span>OSVČ Radar</span></h1><div class="sub">Online práce z celé ČR · fyzická a manuální práce v Praze · pouze IČO / OSVČ / B2B</div></header>
<main><div class="stats"><div class="stat"><strong id="total">0</strong><br>celkem</div><div class="stat"><strong id="fresh">0</strong><br>nových</div><div class="stat done-stat"><strong id="doneCount">0</strong><br>vyřízených</div><div class="stat rejected-stat"><strong id="rejectedCount">0</strong><br>zamítnutých</div></div>
<div class="filters"><input id="q" placeholder="Hledat v nabídkách"><select id="area"><option value="">Všechny oblasti</option><option>Online práce</option><option>Digitální služby</option><option>Lektor</option><option>Manuální práce</option><option>Čištění oken</option></select><select id="status"><option value="">Všechny stavy</option><option value="new">Nové</option><option value="done">Vyřízené</option><option value="rejected">Zamítnuté</option><option value="open">Nevyřízené</option></select></div>
<div id="grid" class="grid"></div></main>
<script>
let jobs=[];const STORAGE_KEY="a24-osvc-radar-done",REJECTED_KEY="a24-osvc-radar-rejected",NOTES_KEY="a24-osvc-radar-notes";const esc=s=>String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
function getDone(){try{return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]"))}catch{return new Set()}}
function getRejected(){try{return new Set(JSON.parse(localStorage.getItem(REJECTED_KEY)||"[]"))}catch{return new Set()}}
function getNotes(){try{return JSON.parse(localStorage.getItem(NOTES_KEY)||"{}")||{}}catch{return {}}}
function saveSet(key,set){localStorage.setItem(key,JSON.stringify([...set]))}
function toggleDone(id){const done=getDone(),rejected=getRejected();if(done.has(id)){done.delete(id)}else{done.add(id);rejected.delete(id)}saveSet(STORAGE_KEY,done);saveSet(REJECTED_KEY,rejected);render()}
function toggleRejected(id){const done=getDone(),rejected=getRejected();if(rejected.has(id)){rejected.delete(id)}else{rejected.add(id);done.delete(id)}saveSet(STORAGE_KEY,done);saveSet(REJECTED_KEY,rejected);render()}
function localToday(){const d=new Date(),off=d.getTimezoneOffset();return new Date(d.getTime()-off*60000).toISOString().slice(0,10)}
function noteEntries(raw){if(!raw)return[];if(Array.isArray(raw))return raw;if(typeof raw==="string")return[{text:raw,date:""}];return[{text:raw.text||"",date:raw.date||""}]}
function formatDate(value){if(!value)return"Bez data";const [y,m,d]=value.split("-");return d&&m&&y?d+". "+m+". "+y:value}
function saveNote(id){const box=document.querySelector('[data-note-box="'+CSS.escape(id)+'"]'),field=box.querySelector('[data-note-id]'),date=box.querySelector('[data-note-date]'),notes=getNotes(),value=field.value.trim();if(!value){const msg=box.querySelector('.note-saved');msg.textContent='Nejdříve napište poznámku';setTimeout(()=>msg.textContent='',1800);return}const list=noteEntries(notes[id]);list.push({text:value,date:date.value||localToday()});notes[id]=list;localStorage.setItem(NOTES_KEY,JSON.stringify(notes));render()}
function deleteNote(id,index){const notes=getNotes(),list=noteEntries(notes[id]);list.splice(index,1);if(list.length)notes[id]=list;else delete notes[id];localStorage.setItem(NOTES_KEY,JSON.stringify(notes));render()}
async function copyReply(id){const field=document.querySelector('[data-reply-id="'+CSS.escape(id)+'"]'),msg=field.closest('.reply-box').querySelector('.copy-saved');try{await navigator.clipboard.writeText(field.value);msg.textContent='Odpověď zkopírována'}catch{field.select();document.execCommand('copy');msg.textContent='Odpověď zkopírována'}setTimeout(()=>msg.textContent='',1800)}
async function load(){try{const r=await fetch("./data/jobs.json?ts="+Date.now(),{cache:"no-store"});if(!r.ok)throw new Error("HTTP "+r.status);jobs=await r.json()}catch(e){console.error("Načtení nabídek selhalo:",e)}render()}
function render(){const q=document.querySelector("#q").value.toLowerCase(),a=area.value,s=status.value,done=getDone(),rejected=getRejected(),notes=getNotes();const out=jobs.filter(j=>(!a||j.area===a)&&(!s||(s==="done"?done.has(j.id):s==="rejected"?rejected.has(j.id):s==="open"?!done.has(j.id)&&!rejected.has(j.id):j.status===s&&!done.has(j.id)&&!rejected.has(j.id)))&&(!q||(JSON.stringify(j)+" "+JSON.stringify(notes[j.id]||"")).toLowerCase().includes(q)));
total.textContent=jobs.length;fresh.textContent=jobs.filter(j=>j.status==="new"&&!done.has(j.id)&&!rejected.has(j.id)).length;doneCount.textContent=jobs.filter(j=>done.has(j.id)).length;rejectedCount.textContent=jobs.filter(j=>rejected.has(j.id)).length;grid.innerHTML=out.length?out.map(j=>{const isDone=done.has(j.id),isRejected=rejected.has(j.id),history=noteEntries(notes[j.id]);const historyHtml=history.length?history.map((n,i)=>`<div class="saved-note"><div class="saved-note-date"><span>📅 ${esc(formatDate(n.date))}</span><button class="delete-note" type="button" onclick='deleteNote(${JSON.stringify(j.id)},${i})'>Smazat</button></div><div class="saved-note-text">${esc(n.text)}</div></div>`).join(""):'<div class="no-notes">Zatím nemáte uloženou žádnou poznámku.</div>';return `<article class="card ${j.status==="new"&&!isDone&&!isRejected?"new":""} ${isDone?"done":""} ${isRejected?"rejected":""}"><div><span class="badge">${esc(j.area)}</span><span class="badge">${esc(j.source)}</span>${isDone?'<span class="badge done-badge">✓ VYŘÍZENO</span>':""}${isRejected?'<span class="badge rejected-badge">✕ ZAMÍTNUTO</span>':""}</div><h2>${esc(j.title)}</h2><div class="meta">${esc(j.company)} · ${esc(j.location)} · nalezeno ${esc(j.found_at)}</div><p>${esc(j.summary)}</p><p class="proof"><b>Důkaz OSVČ:</b> ${esc(j.osvc_proof)}</p><div class="actions"><a href="${esc(j.url)}" target="_blank" rel="noopener">Otevřít nabídku →</a><button class="state-btn done-btn" type="button" onclick='toggleDone(${JSON.stringify(j.id)})'>${isDone?"Vrátit mezi nevyřízené":"✓ Vyřízeno"}</button><button class="state-btn reject-btn" type="button" onclick='toggleRejected(${JSON.stringify(j.id)})'>${isRejected?"Vrátit mezi nevyřízené":"✕ Zamítnuto"}</button></div><div class="reply-box"><label>Návrh odpovědi</label><textarea readonly data-reply-id="${esc(j.id)}">${esc(j.reply_suggestion||"Návrh odpovědi zatím není připraven.")}</textarea><div class="note-row"><button class="copy-btn" type="button" onclick='copyReply(${JSON.stringify(j.id)})'>Kopírovat odpověď</button><span class="copy-saved"></span></div></div><div class="note-box" data-note-box="${esc(j.id)}"><label>Historie poznámek</label><div class="notes-history">${historyHtml}</div><div class="date-row"><label>Datum nové poznámky</label><input class="note-date" type="date" data-note-date="${esc(j.id)}" value="${localToday()}"></div><label>Nová poznámka</label><textarea data-note-id="${esc(j.id)}" placeholder="Napište další poznámku…"></textarea><div class="note-row"><button class="note-btn" type="button" onclick='saveNote(${JSON.stringify(j.id)})'>Přidat poznámku</button><span class="note-saved"></span></div></div></article>`}).join(""):'<div class="empty">V této kategorii nejsou žádné nabídky.</div>'}
document.querySelectorAll("input,select").forEach(x=>x.addEventListener("input",render));load();setInterval(load,60000);document.addEventListener("visibilitychange",()=>{if(!document.hidden)load()});
</script></body></html>
