<!doctype html>
<html lang="cs"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>A24 OSVČ Radar</title>
<style>
:root{--bg:#030712;--panel:#080b16;--accent:#ec0044;--text:#fff;--muted:#9ca3af;--line:#20283a;--done:#22c55e;--done-bg:#071b10}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:15px/1.5 Arial,sans-serif}
header{padding:28px clamp(18px,4vw,54px);border-bottom:1px solid var(--line);background:linear-gradient(135deg,#080b16,#130813)}
h1{margin:0 0 6px;font-size:clamp(28px,4vw,48px)}h1 span{color:var(--accent)}.sub{color:var(--muted)}
main{padding:24px clamp(18px,4vw,54px)}.stats,.filters{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.stat,.filters select,.filters input{background:var(--panel);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:12px}
.stat strong{color:var(--accent);font-size:22px}.stat.done-stat strong{color:var(--done)}.filters input{min-width:260px;flex:1}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px}.card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;transition:.2s ease}
.card.new{border-color:var(--accent)}.card.done{border:2px solid var(--done);background:linear-gradient(145deg,var(--done-bg),var(--panel))}.card.done h2,.card.done .meta,.card.done p,.card.done a:not(.done-btn){opacity:.62}
.meta,.proof{color:var(--muted);font-size:13px}.badge{display:inline-block;padding:4px 8px;border-radius:99px;background:#24101a;color:#ff7ba1;margin:0 6px 8px 0}.done-badge{background:var(--done);color:#041208;font-weight:700}
a{color:#ff5b8a}.actions{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:16px;flex-wrap:wrap}.done-btn{border:1px solid var(--done);background:transparent;color:#86efac;border-radius:9px;padding:9px 13px;font-weight:700;cursor:pointer}.done-btn:hover,.done-btn:focus{background:#123c21}.card.done .done-btn{background:var(--done);color:#041208}.empty{padding:42px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:14px}
</style></head><body>
<header><h1>A24 <span>OSVČ Radar</span></h1><div class="sub">Online práce z celé ČR · fyzická a manuální práce v Praze · pouze IČO / OSVČ / B2B</div></header>
<main><div class="stats"><div class="stat"><strong id="total">0</strong><br>celkem</div><div class="stat"><strong id="fresh">0</strong><br>nových</div><div class="stat done-stat"><strong id="doneCount">0</strong><br>vyřízených</div></div>
<div class="filters"><input id="q" placeholder="Hledat v nabídkách"><select id="area"><option value="">Všechny oblasti</option><option>Online práce</option><option>Digitální služby</option><option>Lektor</option><option>Manuální práce</option><option>Čištění oken</option></select><select id="status"><option value="">Všechny stavy</option><option value="new">Nové</option><option value="done">Vyřízené</option><option value="open">Nevyřízené</option></select></div>
<div id="grid" class="grid"></div></main>
<script>
let jobs=[];const STORAGE_KEY="a24-osvc-radar-done";const esc=s=>String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
function getDone(){try{return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]"))}catch{return new Set()}}
function toggleDone(id){const done=getDone();done.has(id)?done.delete(id):done.add(id);localStorage.setItem(STORAGE_KEY,JSON.stringify([...done]));render()}
async function load(){try{const r=await fetch("./data/jobs.json?ts="+Date.now(),{cache:"no-store"});if(!r.ok)throw new Error("HTTP "+r.status);jobs=await r.json()}catch(e){console.error("Načtení nabídek selhalo:",e)}render()}
function render(){const q=document.querySelector("#q").value.toLowerCase(),a=area.value,s=status.value,done=getDone();const out=jobs.filter(j=>(!a||j.area===a)&&(!s||(s==="done"?done.has(j.id):s==="open"?!done.has(j.id):j.status===s))&&(!q||JSON.stringify(j).toLowerCase().includes(q)));
total.textContent=jobs.length;fresh.textContent=jobs.filter(j=>j.status==="new"&&!done.has(j.id)).length;doneCount.textContent=jobs.filter(j=>done.has(j.id)).length;grid.innerHTML=out.length?out.map(j=>{const isDone=done.has(j.id);return `<article class="card ${j.status==="new"&&!isDone?"new":""} ${isDone?"done":""}"><div><span class="badge">${esc(j.area)}</span><span class="badge">${esc(j.source)}</span>${isDone?'<span class="badge done-badge">✓ VYŘÍZENO</span>':""}</div><h2>${esc(j.title)}</h2><div class="meta">${esc(j.company)} · ${esc(j.location)} · nalezeno ${esc(j.found_at)}</div><p>${esc(j.summary)}</p><p class="proof"><b>Důkaz OSVČ:</b> ${esc(j.osvc_proof)}</p><div class="actions"><a href="${esc(j.url)}" target="_blank" rel="noopener">Otevřít nabídku →</a><button class="done-btn" type="button" onclick='toggleDone(${JSON.stringify(j.id)})'>${isDone?"Vrátit mezi nevyřízené":"✓ Vyřízeno"}</button></div></article>`}).join(""):'<div class="empty">V této kategorii nejsou žádné nabídky.</div>'}
document.querySelectorAll("input,select").forEach(x=>x.addEventListener("input",render));load();setInterval(load,60000);document.addEventListener("visibilitychange",()=>{if(!document.hidden)load()});
</script></body></html>
